    function shuffle(array) {
        let currentIndex = array.length,  randomIndex;
        // While there remain elements to shuffle.

        // Pick a remaining element.
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        // And swap it with the current element.
        [array[currentIndex], array[randomIndex]] = [

 //-----------------------------------------categorization task-----------------------------------------

    // 7 blocks. Each block has two parts:

    // Example: Block 1 feedback part = color1 vs color4, no-feedback part = color2 vs color3

      stimulus:

    // ---- Instructions (parameterized by block number) ----
    function makeCatInstructions(blockNum) {

            data.correct_response = correct_resp;
            data.color_group      = jsPsych.timelineVariable('color_group', true);

  //-----------------------------------------categorization task---------------------------------------



  async function initExperiment() {
    const allimg_triplets = categoryStims;

    var preload_category = {
        type: jsPsychPreload,
        auto_preload: true,
        images: categoryStims.concat(practiceCatStims).concat(unambiguousCatStims),
        show_progress_bar: true,
        message: "Loading experiment files...",
        error_message: "Oops! There's a problem loading files. Please refresh the page to try again."
    };

    // Main-block images (img_cat/)
    function getGroup(num) {
        return allimg_triplets
            .filter(name => name.includes('color' + num + '_'));
    }

    // Practice-block images (img_cat_practice/)
    function getPracticeGroup(num) {
        return practiceCatStims
            .filter(name => name.includes('color' + num + '_'));
    }

    // Unambiguous-block images (img_cat_unambiguous/)
    function getUnambiguousGroup(num) {
        return unambiguousCatStims
            .filter(name => name.includes('color' + num + '_'));
    }

    // ---- Practice block ----
    // Two color pairs: (color1 vs color4) and (color2 vs color3).
    // Randomly assign per participant which pair is the feedback part and which is the no-feedback part.
    var practicePairs = jsPsych.randomization.shuffle([
        { left: 1, right: 4 },
        { left: 2, right: 3 }
    ]);
    var practiceFbPair   = practicePairs[0];
    var practiceNofbPair = practicePairs[1];

    var practiceFbStimuli = [];
    getPracticeGroup(practiceFbPair.left).forEach(function(img_cat) {
        practiceFbStimuli.push({
            catStims: img_cat,
            correct_response: 'arrowleft',
            color_group: 'color' + practiceFbPair.left,
            block: 'practice'
        });
    });
    getPracticeGroup(practiceFbPair.right).forEach(function(img_cat) {
        practiceFbStimuli.push({
            catStims: img_cat,
            correct_response: 'arrowright',
            color_group: 'color' + practiceFbPair.right,
            block: 'practice'
        });
    });

    var practiceNofbStimuli = [];
    getPracticeGroup(practiceNofbPair.left).forEach(function(img_cat) {
        practiceNofbStimuli.push({
            catStims: img_cat,
            color_group: 'color' + practiceNofbPair.left,
            block: 'practice'
        });
    });
    getPracticeGroup(practiceNofbPair.right).forEach(function(img_cat) {
        practiceNofbStimuli.push({
            catStims: img_cat,
            color_group: 'color' + practiceNofbPair.right,
            block: 'practice'
        });
    });

    var practice_fb_procedure = {
        timeline: [fixation, cat_trial_feedback, cat_feedback_node_wrong, cat_feedback_node_corr],
        timeline_variables: practiceFbStimuli,
        randomize_order: true
    };

    var practice_nofb_procedure = {
        timeline: [fixation, cat_trial_nofeedback],
        timeline_variables: practiceNofbStimuli,
        randomize_order: true
    };

    // Four yoked quadruplets. Within a quadruplet the two yoked color pairs
    // (outer pair + inner pair) are preserved, but we randomize per participant:
    //   (a) the presentation order of the four quadruplets (block order), and
    //   (b) within each quadruplet, which yoked pair is the feedback part
    //       and which is the no-feedback part.
    // Left/right arrow-key mapping within a pair is preserved (smaller index -> left,
    // larger index -> right), so the yoking isn't broken.
    var quadruplets = [
        { pairA: [1, 4],   pairB: [2, 3]   },
        { pairA: [5, 8],   pairB: [6, 7]   },
        { pairA: [9, 12],  pairB: [10, 11] },
        { pairA: [13, 16], pairB: [14, 15] }
    ];

    var shuffledQuads = jsPsych.randomization.shuffle(quadruplets);

    timeline.push(preload_category);
    timeline.push(practice_fb_procedure);
    timeline.push(cat_break_within);
    timeline.push(practice_nofb_procedure);
    timeline.push(practiceEnd);

    shuffledQuads.forEach(function(quad, idx) {
        var blockNum = idx + 1;

        // Randomly pick which yoked pair is the feedback pair this participant sees
        var pairs   = jsPsych.randomization.shuffle([quad.pairA, quad.pairB]);
        var fbLeft  = pairs[0][0];
        var fbRight = pairs[0][1];
        var nofbA   = pairs[1][0];
        var nofbB   = pairs[1][1];

        var fbStimuli = [];
        getGroup(fbLeft).forEach(function(img_cat) {
            fbStimuli.push({
                catStims: img_cat,
                correct_response: 'arrowleft',
                color_group: 'color' + fbLeft,
                block: blockNum
            });
        });
        getGroup(fbRight).forEach(function(img_cat) {
            fbStimuli.push({
                catStims: img_cat,
                correct_response: 'arrowright',

        };

        timeline.push(makeCatInstructions(blockNum));
